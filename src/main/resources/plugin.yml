name: NexusMechanica
version: 0.8.0
main: com.nexusuniverse.mechanica.NexusMechanicaPlugin
api-version: '1.21'
author: Nexus Universe
description: Kinetic power and mechanical processing system for Nexus Universe.
commands:
  nexusmechanica:
    description: NexusMechanica administration.
    aliases: [mechanica, nm]
    usage: /nexusmechanica <status|give <type|wrench>|guide|contraption|facility <generate|list|restore|maintain|givekit>>
    permission: nexusmechanica.admin
permissions:
  nexusmechanica.admin:
    description: Manage NexusMechanica.
    default: op
